<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat - Luffy</title>
</head>
<body>
  <div class="chat">

    <div class="chat-content">
      <header class="chat-header">
        <button class="chat-header__toggle"
                aria-label="Cambiar de personaje"
                aria-expanded="false"
                aria-controls="chat-sidebar">
          ☰
        </button>
        <div class="chat-header__avatar" aria-label="Avatar de Luffy">👒</div>
        <h1 class="chat-header__name">Luffy</h1>
      </header>

      <main class="chat-main">
        <section class="chat-messages">

          <div class="chat-message chat-message--character">
            <div class="chat-message__avatar">👒</div>
            <div class="chat-message__bubble">¡Nakama! ¿Cómo estás hoy?</div>
          </div>

          <div class="chat-message chat-message--user">
            <div class="chat-message__bubble">¡Muy bien! ¿Listo para la aventura?</div>
          </div>

          <div class="chat-typing-indicator is-hidden">escribiendo…</div>

        </section>
      </main>

      <footer class="chat-footer">
        <form class="chat-form">
          <input type="text" class="chat-input__field" placeholder="Escribe un mensaje…" aria-label="Mensaje">
          <button type="submit" class="chat-input__send" aria-label="Enviar mensaje">Enviar</button>
        </form>
      </footer>
    </div>

    <!-- chat.js: agregar listener keydown para cerrar el drawer con Escape -->
    <aside class="chat-sidebar" id="chat-sidebar">
      <div class="chat-sidebar__header">Personajes</div>
      <div class="chat-sidebar__list">
        <button class="chat-sidebar__item chat-sidebar__item--active" aria-label="Conversar con Luffy" aria-current="true">
          <span class="chat-sidebar__avatar">👒</span>
          <span class="chat-sidebar__name">Luffy</span>
        </button>
        <button class="chat-sidebar__item" aria-label="Conversar con Brook">
          <span class="chat-sidebar__avatar">💀</span>
          <span class="chat-sidebar__name">Brook</span>
        </button>
        <button class="chat-sidebar__item" aria-label="Conversar con Franky">
          <span class="chat-sidebar__avatar">🤖</span>
          <span class="chat-sidebar__name">Franky</span>
        </button>
      </div>
    </aside>

    <div class="chat-overlay"></div>

  </div>
</body>
</html>
